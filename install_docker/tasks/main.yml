- name: Ensure keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
    group: admin

- name: Download Docker GPG key 
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0744'
  when: ansible_facts['architecture'] == "x86_64"

- name: Download Docker GPG key for RaspberryPi
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/raspbian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0744'
  when: ansible_facts['architecture'] == "armv6l"

- name: Get architecture
  ansible.builtin.command:
    cmd: dpkg --print-architecture
  register: arch

- name: Get OS codename
  ansible.builtin.shell:
    cmd: . /etc/os-release && echo "$VERSION_CODENAME"
  register: codename

- name: Add Docker APT repository file for RaspberryPi
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch={{ arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/raspbian {{ codename.stdout }} stable
  when: ansible_facts['architecture'] == "armv6l" 

- name: Add Docker APT repository file 
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: |
      deb [arch={{ arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ codename.stdout }} stable
  when: ansible_facts['architecture'] == "x86_64"

- name: Update cache
  ansible.builtin.apt:
    update_cache: true

- name: Install docker and its dependencies
  ansible.builtin.apt:
    name: 
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
      - docker-buildx-plugin
  when: ansible_facts['architecture'] == "x86_64" 

- name: Install docker for RaspberryPI
  ansible.builtin.apt:
    name: 
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
  when: ansible_facts['architecture'] == "armv6l" 

- name: Ensure Docker plugin directory exists
  ansible.builtin.file:
    path: /usr/libexec/docker/cli-plugins
    state: directory
    mode: '0755'

- name: Download Docker Compose for RaspberryPI
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/download/v2.39.4/docker-compose-linux-armv6
    dest: /usr/libexec/docker/cli-plugins/docker-compose
    mode: '0711'
  when: ansible_facts['architecture'] ==  "armv6l" 

- name: Download Docker Buildx for RaspberryPI
  ansible.builtin.get_url:
    url: https://github.com/docker/buildx/releases/download/v0.28.0/buildx-v0.28.0.linux-arm-v6
    dest: /usr/libexec/docker/cli-plugins/docker-buildx
    mode: '0711'
  when: ansible_facts['architecture'] == "armv6l"

- name: Download Docker Compose
  ansible.builtin.get_url:
    url: https://github.com/docker/compose/releases/download/{{ compose_version }}/docker-compose-linux-x86_64
    dest: /usr/libexec/docker/cli-plugins/docker-compose
    mode: '0711'
  when: ansible_facts['architecture'] == "x86_64"

- name: Ensure group "docker" exists 
  ansible.builtin.group:
    name: docker
    state: present

- name: Add docker user to the Docker group
  ansible.builtin.user:
    name: "{{ ansible_env.USER }}"
    groups: docker
    append: yes
